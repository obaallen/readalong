<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ReadAlong</title>
  <style>
    body { width: 280px; padding: 12px; font-family: system-ui; }
    h1 { font-size: 1rem; margin: 0 0 12px 0; }
    button { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #ccc; background: #f5f5f5; cursor: pointer; }
    button.primary { background: #d97706; color: white; border-color: #d97706; }
    button:hover { background: #e5e5e5; }
    button.primary:hover { background: #b45309; }
  </style>
</head>
<body>
  <h1>ReadAlong</h1>
  <button type="button" class="primary" id="read-page">Read this page</button>
  <script src="popup.js"></script>
</body>
</html>
